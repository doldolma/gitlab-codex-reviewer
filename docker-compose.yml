name: gitlab-codex-reviewer

services:
  app:
    image: ghcr.io/doldolma/gitlab-bot:${IMAGE_TAG:-latest}
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - gitlab-codex-reviewer-data:/app/.data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  gitlab-codex-reviewer-data:
